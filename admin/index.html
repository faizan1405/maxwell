<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Amahle Blue</title>
  <meta name="robots" content="noindex, nofollow" />
  <!-- Resolve asset paths relative to the project root so images work in both admin and storefront -->
  <base href="../">

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4/dist/index.global.min.js"></script>
  <style type="text/tailwindcss">
    @theme {
      --color-cobalt:   #1E50E0;
      --color-cobalt-d: #1A40B5;
      --color-ink:      #0B2545;
      --color-grass:    #159A4C;
      --font-sans: "Plus Jakarta Sans", ui-sans-serif, system-ui, sans-serif;
    }
  </style>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { margin: 0; font-family: "Plus Jakarta Sans", system-ui, sans-serif; background: #F1F5F9; color: #0F172A; -webkit-font-smoothing: antialiased; }
    ::selection { background: #1E50E0; color: #fff; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }
    .sidebar-nav::-webkit-scrollbar { width: 3px; }
    .sidebar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); }
    @keyframes fadein  { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    @keyframes slideup { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes abmodal { from { opacity:0; transform:scale(.96) translateY(10px); } to { opacity:1; transform:scale(1) translateY(0); } }
    @keyframes abfade  { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
    @keyframes abpop   { 0%,100%{transform:scale(1)} 35%{transform:scale(1.4)} 70%{transform:scale(0.9)} }
    @keyframes abshake { 0%,100%{transform:translateX(0)} 18%,54%{transform:translateX(-4px)} 36%,72%{transform:translateX(4px)} }
    @keyframes absucc  { 0%{transform:scale(.4);opacity:0} 55%{transform:scale(1.15)} 100%{transform:scale(1);opacity:1} }
    @keyframes abskel  { from{background-position:-400px 0} to{background-position:400px 0} }

    .animate-fadein   { animation: fadein  0.25s cubic-bezier(.16,1,.3,1) both; }
    .animate-slideup  { animation: slideup 0.3s  cubic-bezier(.16,1,.3,1) both; }
    .animate-spin     { animation: spin    0.7s  linear infinite; }
    .ab-modal-enter   { animation: abmodal 0.28s cubic-bezier(.16,1,.3,1) both; }
    .ab-fade-in       { animation: abfade  0.22s cubic-bezier(.16,1,.3,1) both; }
    .ab-succ-enter    { animation: absucc  0.45s cubic-bezier(.36,.07,.19,.97) .05s both; }
    .ab-skeleton {
      background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
      background-size: 400px 100%;
      animation: abskel 1.4s ease-in-out infinite;
      border-radius: 6px;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .01ms !important;
      }
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
</head>
