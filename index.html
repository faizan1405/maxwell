    html { scroll-behavior: smooth; }

    /* ── Core keyframes ─────────────────────────────────────────────────────── */
    @keyframes abfade   { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
    @keyframes abfloat  { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-8px); } }
    @keyframes abpage   { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes abmodal  { from { opacity:0; transform:scale(.96) translateY(10px); } to { opacity:1; transform:scale(1) translateY(0); } }
    @keyframes abdrawer-r { from { transform:translateX(100%); } to { transform:translateX(0); } }
    @keyframes abdrawer-l { from { transform:translateX(-100%); } to { transform:translateX(0); } }

    /* ── Micro-interaction keyframes ────────────────────────────────────────── */
    @keyframes abpop    { 0%,100%{transform:scale(1)} 35%{transform:scale(1.45)} 70%{transform:scale(0.88)} }
    @keyframes abheart  { 0%{transform:scale(1)} 20%{transform:scale(0.85)} 50%{transform:scale(1.35)} 75%{transform:scale(0.95)} 100%{transform:scale(1)} }
    @keyframes abshake  { 0%,100%{transform:translateX(0)} 18%,54%{transform:translateX(-5px)} 36%,72%{transform:translateX(5px)} }
    @keyframes absucc   { 0%{transform:scale(.4);opacity:0} 55%{transform:scale(1.15)} 80%{transform:scale(.95)} 100%{transform:scale(1);opacity:1} }
    @keyframes abpulse  { 0%,100%{box-shadow:0 0 0 0 rgba(30,80,224,0.4)} 50%{box-shadow:0 0 0 6px rgba(30,80,224,0)} }
    @keyframes spin     { to { transform: rotate(360deg); } }

    /* ── Loading skeleton shimmer ───────────────────────────────────────────── */
    @keyframes abskel   { from{background-position:-400px 0} to{background-position:400px 0} }
    .ab-skeleton {
      background: linear-gradient(90deg, #f0f4f8 25%, #e2eaf2 50%, #f0f4f8 75%);
      background-size: 400px 100%;
      animation: abskel 1.4s ease-in-out infinite;
      border-radius: 8px;
    }

    /* ── Utility animation classes ──────────────────────────────────────────── */
    .ab-page-enter  { animation: abpage  .45s cubic-bezier(.16,1,.3,1) both; }
    .ab-fade-in     { animation: abfade  .25s cubic-bezier(.16,1,.3,1) both; }
    .ab-modal-enter { animation: abmodal .28s cubic-bezier(.16,1,.3,1) both; }
    .ab-succ-enter  { animation: absucc  .5s  cubic-bezier(.36,.07,.19,.97) .1s both; }

    /* ── Accessibility ──────────────────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .01ms !important;
      }
    }

    ::-webkit-scrollbar { width: 12px; }
    ::-webkit-scrollbar-track { background: #eef2f7; }
    ::-webkit-scrollbar-thumb { background: #c3d0e2; border-radius: 99px; border: 3px solid #eef2f7; }
    ::-webkit-scrollbar-thumb:hover { background: #1E50E0; }
