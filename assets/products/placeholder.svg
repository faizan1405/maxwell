<svg xmlns="http://www.w3.org/2000/svg" width="400" height="533" viewBox="0 0 400 533" fill="none">
  <!-- Background -->
  <rect width="400" height="533" fill="#F0F4FF"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#E0E8FF" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="400" height="533" fill="url(#grid)"/>

  <!-- Bottle body -->
  <rect x="150" y="160" width="100" height="220" rx="18" fill="#C7D9F8"/>

  <!-- Bottle shoulder -->
  <path d="M 150 180 Q 150 160 170 155 L 230 155 Q 250 160 250 180" fill="#B8CDF5"/>

  <!-- Bottle neck -->
  <rect x="175" y="115" width="50" height="45" rx="8" fill="#B8CDF5"/>

  <!-- Bottle cap -->
  <rect x="170" y="100" width="60" height="22" rx="7" fill="#1D4ED8"/>

  <!-- Pump nozzle -->
  <rect x="195" y="85" width="10" height="20" rx="3" fill="#1D4ED8"/>
  <rect x="185" y="83" width="30" height="6" rx="3" fill="#1D4ED8"/>

  <!-- Label on bottle -->
  <rect x="158" y="195" width="84" height="110" rx="10" fill="white" opacity="0.85"/>

  <!-- Brand mark on label -->
  <rect x="168" y="205" width="64" height="4" rx="2" fill="#1D4ED8" opacity="0.7"/>
  <rect x="173" y="215" width="54" height="3" rx="1.5" fill="#93B4F5" opacity="0.7"/>
  <rect x="163" y="228" width="74" height="3" rx="1.5" fill="#CBD5E1" opacity="0.7"/>
  <rect x="163" y="236" width="74" height="3" rx="1.5" fill="#CBD5E1" opacity="0.7"/>
  <rect x="163" y="244" width="55" height="3" rx="1.5" fill="#CBD5E1" opacity="0.7"/>

  <!-- Drop icon on label -->
  <path d="M 193 262 Q 200 252 207 262 Q 207 272 200 274 Q 193 272 193 262Z" fill="#1D4ED8" opacity="0.35"/>

  <!-- Bottle highlight -->
  <rect x="158" y="175" width="10" height="80" rx="5" fill="white" opacity="0.25"/>

  <!-- Sparkle dots -->
  <circle cx="100" cy="120" r="5" fill="#1D4ED8" opacity="0.12"/>
  <circle cx="88" cy="108" r="3" fill="#1D4ED8" opacity="0.08"/>
  <circle cx="113" cy="105" r="2.5" fill="#1D4ED8" opacity="0.1"/>
  <circle cx="300" cy="380" r="6" fill="#1D4ED8" opacity="0.1"/>
  <circle cx="315" cy="368" r="3.5" fill="#1D4ED8" opacity="0.07"/>
  <circle cx="290" cy="365" r="2.5" fill="#1D4ED8" opacity="0.09"/>

  <!-- Bottom text -->
  <text x="200" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#94A3B8" text-anchor="middle" letter-spacing="1">AMAHLE BLUE</text>
  <text x="200" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#CBD5E1" text-anchor="middle" letter-spacing="0.5">Product Image Coming Soon</text>
</svg>
